// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
        classpath 'com.google.gms:google-services:4.4.0'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

// Fix: AgpVersionAttr mismatch between Android Studio and Capacitor plugins
abstract class AgpVersionCompatibilityRule implements AttributeCompatibilityRule<String> {
    @Override
    void execute(CompatibilityCheckDetails<String> details) {
        details.compatible()
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    dependencies.attributesSchema {
        attribute(Attribute.of('com.android.build.api.attributes.AgpVersionAttr', String)) {
            compatibilityRules.add(AgpVersionCompatibilityRule)
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
